name: recycleorigindriver
description: RecycleOrigin driver application

publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0
  http: ^1.2.2
  intl: ^0.20.0
  flutter_widget_from_html_core: ^0.17.0
#  share: ^2.0.4
  url_launcher: ^6.3.1
  flutter_spinkit: ^5.2.1
  geolocator: ^14.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  cupertino_icons: ^1.0.9
  package_info_plus: ^9.0.1
  flutter_map_cancellable_tile_provider: ^3.0.2
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_auth: ^6.1.0
  google_sign_in: ^6.3.0
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  flutter_dotenv: ^6.0.0
  dio: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  bloc_test: ^10.0.0
  flutter_lints: ^5.0.0


flutter:
  default-flavor: dev
  generate: true

  uses-material-design: true
  assets:
    - assets/env/.env.dev
    - assets/env/.env.staging
    - assets/env/.env.prod
    - assets/images/splash_main.png
    - assets/images/
    - assets/images/main_page_header.png
    - assets/images/main_page_request_ic.png
    - assets/images/main_page_article_ic.png
    - assets/images/main_page_shop_ic.png
    - assets/images/main_page_wallet_ic.png
    - assets/images/address_page_header.png
    - assets/images/login_bg.png
    - assets/images/logo.jpg
    - assets/images/phone_icon.png
    - assets/images/instagram.png
    - assets/images/telegram.png
    - assets/images/circle.gif
    - assets/images/circle2.gif
    - assets/images/orders_list.png
    - assets/images/message_icon.png
    - assets/images/user_Icon.png
    - assets/images/cash_pay_header.jpg
    - assets/images/wallet_money_bg.png
    - assets/images/collect_list_header.png
    - assets/images/donation_ic.png
    - assets/images/messages_screen_mail_ic.png
    - assets/images/send_popup_tick.png
    - assets/images/waste_cart_weight_ic.png
    - assets/images/waste_cart_price_ic.png
